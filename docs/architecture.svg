<svg viewBox="0 0 1240 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif" role="img">
  <title>Meridian runtime architecture</title>
  <desc>How Meridian actually runs: the intelligence is deterministic and executes in the browser; a thin Vercel server proxies free public data with seeded fallback; an optional client-side call goes directly to Gemini.</desc>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8f9096"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto"><path d="M9,0 L0,4.5 L9,9 z" fill="#8f9096"/></marker>
  </defs>
  <rect width="1240" height="720" fill="#fafafa"/>

  <text x="40" y="48" fill="#171717" font-size="28" font-weight="600" font-family="Georgia, serif">Meridian — runtime architecture</text>
  <text x="40" y="71" fill="#52525b" font-size="13">The intelligence runs in the browser · a thin server only proxies free data · the LLM is an optional direct call</text>

  <!-- BAND A · BROWSER -->
  <rect x="40" y="92" width="1160" height="212" rx="12" fill="#ffffff" stroke="#e9eaec"/>
  <text x="60" y="118" fill="#0f62fe" font-size="12" font-weight="700" font-family="ui-monospace, monospace" letter-spacing="1">BROWSER</text>
  <text x="132" y="118" fill="#8f9096" font-size="12">— the client does the thinking (deterministic, free, no server round-trip)</text>
  <g font-size="12.5">
    <g><rect x="60" y="134" width="255" height="150" rx="8" fill="#f5f6f8" stroke="#e9eaec"/>
      <text x="76" y="160" fill="#171717" font-weight="600">/ Landing</text>
      <text x="76" y="182" fill="#52525b" font-size="11.5">COBE globe (WebGL)</text>
      <text x="76" y="200" fill="#52525b" font-size="11.5">GSAP ScrollTrigger + Lenis</text>
      <text x="76" y="218" fill="#52525b" font-size="11.5">counting stats · shock scene</text>
      <text x="76" y="256" fill="#8f9096" font-size="10.5">→ "Enter the console"</text></g>

    <g><rect x="332" y="134" width="255" height="150" rx="8" fill="#f5f6f8" stroke="#e9eaec"/>
      <text x="348" y="160" fill="#171717" font-weight="600">/console</text>
      <text x="348" y="182" fill="#52525b" font-size="11.5">deck.gl + MapLibre twin</text>
      <text x="348" y="200" fill="#52525b" font-size="11.5">directed camera · ripple · arcs</text>
      <text x="348" y="218" fill="#52525b" font-size="11.5">docks · ⌘K · light / dark</text>
      <text x="348" y="256" fill="#8f9096" font-size="10.5">renders store state @ 60fps</text></g>

    <g><rect x="604" y="134" width="255" height="150" rx="8" fill="#f5f6f8" stroke="#e9eaec"/>
      <text x="620" y="160" fill="#171717" font-weight="600">Zustand store</text>
      <text x="620" y="182" fill="#52525b" font-size="11.5">director (camera cues, ripple)</text>
      <text x="620" y="200" fill="#52525b" font-size="11.5">theme · approvals · live data</text>
      <text x="620" y="218" fill="#52525b" font-size="11.5">single source of truth</text></g>

    <g><rect x="876" y="134" width="264" height="150" rx="8" fill="#0f62fe" fill-opacity="0.06" stroke="#0f62fe" stroke-opacity="0.45"/>
      <text x="892" y="160" fill="#0f62fe" font-weight="700">Deterministic engine ★</text>
      <text x="892" y="182" fill="#52525b" font-size="11.5">sense → reason → act → verify</text>
      <text x="892" y="200" fill="#52525b" font-size="11.5">transparent cascade model</text>
      <text x="892" y="218" fill="#52525b" font-size="11.5">ranked + verified reroutes</text>
      <text x="892" y="256" fill="#14754c" font-size="10.5" font-weight="600">runs 100% in-browser · free</text></g>
  </g>

  <!-- arrow browser <-> vercel -->
  <line x1="220" y1="304" x2="220" y2="356" stroke="#8f9096" marker-end="url(#a)" marker-start="url(#ao)"/>
  <text x="234" y="334" fill="#52525b" font-size="11" font-family="ui-monospace, monospace">fetch /api/data/*</text>

  <!-- BAND B · VERCEL -->
  <rect x="40" y="356" width="1160" height="98" rx="12" fill="#ffffff" stroke="#e9eaec"/>
  <text x="60" y="382" fill="#1e3a5f" font-size="12" font-weight="700" font-family="ui-monospace, monospace" letter-spacing="1">VERCEL</text>
  <text x="120" y="382" fill="#8f9096" font-size="12">— Next.js server · a thin data proxy (each route falls back to seeded on failure)</text>
  <g font-size="11.5" fill="#52525b" font-family="ui-monospace, monospace">
    <g><rect x="60" y="398" width="255" height="38" rx="7" fill="#f5f6f8" stroke="#e9eaec"/><text x="187" y="422" text-anchor="middle">/api/data/prices</text></g>
    <g><rect x="332" y="398" width="255" height="38" rx="7" fill="#f5f6f8" stroke="#e9eaec"/><text x="459" y="422" text-anchor="middle">/api/data/news</text></g>
    <g><rect x="604" y="398" width="255" height="38" rx="7" fill="#f5f6f8" stroke="#e9eaec"/><text x="731" y="422" text-anchor="middle">/api/data/vessels</text></g>
    <g><rect x="876" y="398" width="264" height="38" rx="7" fill="#f5f6f8" stroke="#e9eaec"/><text x="1008" y="422" text-anchor="middle">/api/data/sanctions</text></g>
  </g>

  <!-- arrow vercel <-> external -->
  <line x1="220" y1="454" x2="220" y2="506" stroke="#8f9096" marker-end="url(#a)" marker-start="url(#ao)"/>
  <text x="234" y="484" fill="#52525b" font-size="11" font-family="ui-monospace, monospace">server-side fetch</text>

  <!-- BAND C · EXTERNAL -->
  <rect x="40" y="506" width="1160" height="96" rx="12" fill="#f5f6f8" stroke="#e9eaec"/>
  <text x="60" y="532" fill="#14754c" font-size="12" font-weight="700" font-family="ui-monospace, monospace" letter-spacing="1">FREE EXTERNAL SERVICES</text>
  <text x="300" y="532" fill="#8f9096" font-size="12">— no paid vendors</text>
  <g font-size="11.5" fill="#52525b" font-family="Inter, sans-serif">
    <g><rect x="60" y="548" width="118" height="34" rx="7" fill="#fff" stroke="#e9eaec"/><text x="119" y="570" text-anchor="middle">EIA · prices</text></g>
    <g><rect x="188" y="548" width="118" height="34" rx="7" fill="#fff" stroke="#e9eaec"/><text x="247" y="570" text-anchor="middle">GDELT · news</text></g>
    <g><rect x="316" y="548" width="120" height="34" rx="7" fill="#fff" stroke="#e9eaec"/><text x="376" y="570" text-anchor="middle">OFAC · sanctions</text></g>
    <g><rect x="446" y="548" width="120" height="34" rx="7" fill="#fff" stroke="#e9eaec"/><text x="506" y="570" text-anchor="middle">AISStream · AIS</text></g>
    <g><rect x="576" y="548" width="130" height="34" rx="7" fill="#fff" stroke="#e9eaec"/><text x="641" y="570" text-anchor="middle">PPAC · refineries</text></g>
    <g><rect x="716" y="548" width="120" height="34" rx="7" fill="#fff" stroke="#e9eaec"/><text x="776" y="570" text-anchor="middle">CARTO · tiles</text></g>
    <g><rect x="980" y="548" width="160" height="34" rx="7" fill="#fff" stroke="#935610" stroke-opacity="0.4"/><text x="1060" y="570" text-anchor="middle" fill="#935610" font-weight="600">Google Gemini</text></g>
  </g>

  <!-- direct browser -> Gemini (client-side, dashed, bypasses server) -->
  <path d="M1060 284 C1170 320, 1180 460, 1100 546" fill="none" stroke="#935610" stroke-opacity="0.6" stroke-width="1.4" stroke-dasharray="5 5" marker-end="url(#a)"/>
  <rect x="1120" y="392" width="98" height="46" rx="7" fill="#fff" stroke="#935610" stroke-opacity="0.3"/>
  <text x="1169" y="410" text-anchor="middle" fill="#935610" font-size="10" font-family="ui-monospace, monospace">opt-in ·</text>
  <text x="1169" y="424" text-anchor="middle" fill="#935610" font-size="10" font-family="ui-monospace, monospace">your key ·</text>
  <text x="1169" y="437" text-anchor="middle" fill="#935610" font-size="9.5" font-family="ui-monospace, monospace">never server</text>

  <!-- footer -->
  <text x="40" y="636" fill="#171717" font-size="12.5">The core intelligence is <tspan fill="#0f62fe" font-weight="600">deterministic and runs entirely in the browser</tspan> — free, instant, works offline on seeded data.</text>
  <text x="40" y="656" fill="#52525b" font-size="12">The server only proxies <tspan fill="#14754c" font-weight="600">free public data</tspan> (seeded-safe on failure). The LLM brief is an <tspan fill="#935610" font-weight="600">optional direct browser→Gemini call</tspan> with your own key.</text>
  <text x="40" y="684" fill="#8f9096" font-size="11" font-family="ui-monospace, monospace">Next.js 16 · React 19 · deck.gl + MapLibre · COBE · GSAP + Lenis · Zustand · Tailwind v4 · deployed on Vercel</text>
</svg>
